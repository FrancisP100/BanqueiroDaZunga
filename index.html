function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }

const DB = {
  configKey: 'bci_zumba_sheet_config',
  getConfig(){
    try { return JSON.parse(localStorage.getItem(this.configKey) || '{}'); } catch { return {}; }
  },
  saveConfig(cfg){ localStorage.setItem(this.configKey, JSON.stringify(cfg)); },
  init(){
    SHEET_TABLES.forEach(t => {
      const key = 'bci_zumba_'+t.toLowerCase();
      if(!localStorage.getItem(key)){
        localStorage.setItem(key, JSON.stringify(DEFAULT_DB[t] || []));
      }
    });
  },
  read(table){
    return JSON.parse(localStorage.getItem('bci_zumba_'+table.toLowerCase()) || '[]');
  },
  write(table, rows){
    localStorage.setItem('bci_zumba_'+table.toLowerCase(), JSON.stringify(rows));
  },
  insert(table, row){
    const rows = this.read(table);
    rows.unshift(row);
    this.write(table, rows);
    return row;
  },
  update(table, matchFn, patch){
    const rows = this.read(table);
    const idx = rows.findIndex(matchFn);
    if(idx > -1){ rows[idx] = {...rows[idx], ...patch}; this.write(table, rows); return rows[idx]; }
    return null;
  }
};
DB.init();

function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(-4px)';
  clearTimeout(toast._tid);
  toast._tid = setTimeout(()=> { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(6px)'; }, 2400);
}
function fmtDate(iso){ if(!iso) return '-'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function nowHM(){ return new Date().toLocaleTimeString('pt-PT',{hour:'2-digit', minute:'2-digit'}); }
function haversine(lat1, lon1, lat2, lon2){
  const R=6371e3; const toRad = x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function genId(prefix){ return prefix + '-' + Math.floor(8000 + Math.random()*1999); }

function logout(){ Session.clear(); session=null; render(); }

/* RENDER ROOT */
function render(){
  session = Session.get();
  const app = document.getElementById('app');
  if(!session){
    app.innerHTML = AuthScreen(appMode);
    bindAuth();
    return;

  if(session.mode !== appMode){

    appMode = session.mode;

  if(appMode === 'banqueiro'){
    app.innerHTML = BanqueiroShell();
    bindBanqueiro();

}

function bindAuth(){
  $('#toggleAppMode').onclick = ()=>{ appMode = appMode === 'banqueiro' ? 'chefe' : 'banqueiro'; render(); };
  let authMode = 'login';
  document.querySelectorAll('.auth-tab').forEach(btn=>{
    btn.onclick = () => {
      authMode = btn.dataset.authTab;
      document.querySelectorAll('.auth-tab').forEach(b=>{
        b.classList.remove('bg-bci-navy','text-white');
        b.classList.add('text-bci-muted');
      });
      btn.classList.add('bg-bci-navy','text-white');
      btn.classList.remove('text-bci-muted');
      $('#auth_extra').classList.toggle('hidden', authMode==='login');
      $('#auth_submit_btn').textContent = authMode==='login' ? 'Entrar na plataforma' : 'Criar conta';
    }
  });

  $('#authForm').onsubmit = (e)=>{
    e.preventDefault();
    const nome = $('#auth_nome').value.trim();
    const id = $('#auth_id').value.trim();
    const tel = ($('#auth_tel')?.value || '').trim();
    if(!nome || !id){ toast('Preencha nome e ID'); return; }
    const isBanqueiro = appMode==='banqueiro';
    const table = isBanqueiro ? 'Usuarios_Banqueiros' : 'Usuarios_Chefes';
    const idField = isBanqueiro ? 'id_banqueiro' : 'id_chefe';
    const users = DB.read(table);
    const found = users.find(u => (u.nome||'').toLowerCase() === nome.toLowerCase() && u[idField] === id);

    if(authMode === 'register'){
      if(found){ toast('Esse utilizador já existe. Faça login.'); return; }
      const newUser = isBanqueiro ? { nome, id_banqueiro:id, telefone: tel, provincia:"Luanda"} : { nome, id_chefe:id, area:"Luanda"};
      DB.insert(table, newUser);
      Session.set(appMode, newUser);
      toast('Conta criada com sucesso!');
      render();
      return;
    } else {
      if(!found){ toast('Credenciais inválidas. Verifique Nome + ID.'); return; }
      Session.set(appMode, found);
      toast('Sessão iniciada');
      render();
    }
  };
}

function initials(name){
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function bindBanqueiro(){
  document.querySelectorAll('#bqNav [data-route]').forEach(b=>{
    b.onclick = ()=> navigate(b.dataset.route);
  });
  document.querySelectorAll('[data-route-go]').forEach(b=>{
    b.onclick = ()=> navigate(b.dataset.routeGo);
  });
  $('#btnLogout').onclick = logout;
  $('#btnSwitchToChefe').onclick = ()=> { Session.clear(); appMode='chefe'; render(); };
  $('#btnSheetCfg').onclick = ()=> {
    $('#sheetModal').classList.remove('hidden');
    const cfg = DB.getConfig();
    $('#sheetEndpoint').value = cfg.endpoint || '';
  };
  document.querySelectorAll('[data-close-sheet]').forEach(el=> el.onclick = ()=> $('#sheetModal').classList.add('hidden'));
  $('#saveSheetCfg')?.addEventListener('click', ()=>{
    DB.saveConfig({ endpoint: $('#sheetEndpoint').value.trim() });
    toast('Configuração guardada localmente');
    $('#sheetModal').classList.add('hidden');
  });

  // Presence buttons
  const presenceBtns = ['#quickPresenceBtn','#dashPresence'].map(s=>document.querySelector(s)).filter(Boolean);
  presenceBtns.forEach(btn=> btn.onclick = openPresenceFlow);

  // Conta form
  const contaForm = $('#contaForm');
  if(contaForm){
    contaForm.onsubmit = (e)=>{
      e.preventDefault();
      const fd = new FormData(contaForm);
      const user = Session.get().user;
      const row = {
        id: genId('CT'),
        data: todayISO(),
        banqueiro_id: user.id_banqueiro,
        banqueiro_nome: user.nome,
        cliente_nome: fd.get('cliente_nome'),
        bi: fd.get('bi'),
        telefone: fd.get('telefone'),
        pacote: fd.get('pacote'),
        status: 'aberta',
        local: (fd.get('local')||'').split(' – ')[0]
      };
      DB.insert('Contas', row);
      toast('Conta aberta e sincronizada com a Sheet Contas');
      navigate('contas_abertas');
    };
  }

  const exportBtn = $('#exportCsv');
  if(exportBtn){
    exportBtn.onclick = ()=>{
      const rows = DB.read('Contas').filter(c=>c.banqueiro_id === Session.get().user.id_banqueiro);
      const csv = 'ID,Data,Cliente,BI,Telefone,Pacote,Status\n' + rows.map(r=>[r.id,r.data,r.cliente_nome,r.bi,r.telefone,r.pacote,r.status].join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'contas_banqueiro.csv'; a.click();
    };
  }

  // mobile sidebar toggle
  const side = $('#sideMenu');
  let menuOpen = false;
  $('#btnOpenMenu').onclick = ()=>{
    menuOpen = !menuOpen;
    side.classList.toggle('hidden', false);
    if(window.innerWidth < 1024){
      side.style.display = menuOpen ? 'block' : 'none';
    }
  };
  if(window.innerWidth < 1024){
    side.style.display = 'none';
  }
  window.addEventListener('resize', ()=>{
    if(window.innerWidth >= 1024){ side.style.display = ''; }
  });

  // update presence quick status
  refreshPresenceQuick();
}

function refreshPresenceQuick(){
  const el = document.getElementById('presenceQuickStatus');
  if(!el) return;
  const user = Session.get()?.user;
  if(!user) return;
  const pres = DB.read('Presenca').find(p=>p.banqueiro_id===user.id_banqueiro && p.data===todayISO());
  if(!pres){ el.textContent = 'Ainda não marcada hoje'; return; }
  el.innerHTML = pres.status==='no_local'
    ? `<span class="text-emerald-700 font-semibold">Presente em ${pres.local_nome}</span> • entrada ${pres.entrada}${pres.saida ? ' • saída '+pres.saida : ''}`
    : `<span class="text-red-600 font-semibold">Fora do local</span> • ${pres.local_nome}`;
}

function openPresenceFlow(){
  const user = Session.get().user;
  const existing = DB.read('Presenca').find(p=>p.banqueiro_id === user.id_banqueiro && p.data===todayISO());
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 z-[70] flex items-center justify-center p-4';
  modal.innerHTML = `
    <div class="absolute inset-0 bg-bci-navy/55" data-close></div>
    <div class="relative bg-white rounded-[24px] shadow-soft w-full max-w-[560px] p-6">
      <div class="text-[20px] font-[800]">Marcar Presença • GPS</div>
      <p class="text-[13.5px] text-bci-muted mt-1">Vamos validar a sua localização contra os mercados cadastrados na aba <b>Locais</b>. Raio de validação: 100 m.</p>
      <div id="presenceBox" class="mt-4 rounded-[16px] border border-bci-line bg-bci-bg px-4 py-4 text-[14px]">A obter localização…</div>
      <div class="flex flex-wrap gap-2 mt-4">
        <button id="btnDoPresence" class="px-4 py-3 rounded-xl bg-bci-navy text-white font-[700]">Usar minha localização GPS</button>
        <button id="btnManualPresence" class="px-4 py-3 rounded-xl border border-bci-line font-semibold">Escolher mercado manualmente</button>
        <button data-close class="px-4 py-3 rounded-xl text-bci-muted font-semibold">Fechar</button>
      </div>
      <div id="presenceResult" class="mt-3 text-[13.5px]"></div>
    </div>
  `;
  document.body.appendChild(modal);
  const close = ()=> modal.remove();
  modal.querySelectorAll('[data-close]').forEach(b=>b.onclick=close);

  const box = modal.querySelector('#presenceBox');
  const result = modal.querySelector('#presenceResult');

  function setResult(lat, lng, manualLocal=null){
    const locais = DB.read('Locais');
    let nearest = null, minDist = Infinity;
    locais.forEach(l=>{
      const d = haversine(lat, lng, l.lat, l.lng);
      if(d < minDist){ minDist = d; nearest = l; }
    });
    const within = minDist <= 100;
    const chosen = manualLocal || nearest;
    const status = manualLocal ? 'no_local' : (within ? 'no_local' : 'fora_do_local');
    const statusHtml = status==='no_local'
      ? `<span class="text-emerald-700 font-[700]">Presente no local correto ✓</span>`
      : `<span class="text-red-600 font-[700]">Fora do local • ${Math.round(minDist)}m do ${nearest.nome}</span>`;
    box.innerHTML = `Lat ${lat.toFixed(5)}, Lng ${lng.toFixed(5)}<br><b>${chosen.nome}</b> • ${chosen.provincia}<br>${statusHtml}`;
    
    // Save
    const presList = DB.read('Presenca');
    const today = todayISO();
    const idx = presList.findIndex(p=>p.banqueiro_id===user.id_banqueiro && p.data===today);
    const record = {
      id: existing?.id || genId('PR'),
      banqueiro_id: user.id_banqueiro,
      nome: user.nome,
      data: today,
      entrada: existing?.entrada || nowHM(),
      saida: existing?.saida || '',
      lat, lng,
      local_nome: chosen.nome,
      provincia: chosen.provincia,
      status
    };
    if(idx>=0) { presList[idx] = {...presList[idx], ...record}; DB.write('Presenca', presList); }
    else DB.insert('Presenca', record);

    result.innerHTML = status==='no_local'
      ? `<div class="text-emerald-700">Presença registada com sucesso na aba <b>Presenca</b>.</div>
         <button id="btnMarcarSaida" class="mt-2 px-3 py-2 rounded-lg bg-white border border-bci-line font-semibold text-[13px]">Marcar saída</button>`
      : `<div class="text-red-600 font-semibold">Alerta enviado aos Chefes: banqueiro fora do local.</div>`;
    
    refreshPresenceQuick();
    const saidaBtn = modal.querySelector('#btnMarcarSaida');
    if(saidaBtn){
      saidaBtn.onclick = ()=>{
        const list = DB.read('Presenca');
        const i = list.findIndex(p=>p.banqueiro_id===user.id_banqueiro && p.data===today);
        if(i>=0){ list[i].saida = nowHM(); DB.write('Presenca', list); toast('Saída registada'); result.innerHTML = '<span class="text-bci-muted">Saída registada às '+list[i].saida+'</span>'; refreshPresenceQuick(); }
      };
    }
  }

  modal.querySelector('#btnDoPresence').onclick = ()=>{
    if(!navigator.geolocation){ box.textContent = 'Geolocalização não suportada.'; return; }
    box.textContent = 'A obter GPS… permita o acesso.';
    navigator.geolocation.getCurrentPosition(pos=>{
      setResult(pos.coords.latitude, pos.coords.longitude);
    }, err=>{
      box.innerHTML = 'Não foi possível obter GPS ('+err.message+'). Use a selecção manual.';
    }, { enableHighAccuracy:true, timeout:9000 });
  };

  modal.querySelector('#btnManualPresence').onclick = ()=>{
    const locais = DB.read('Locais');
    box.innerHTML = `<div class="text-[12.5px] font-semibold text-bci-muted mb-2">Escolha o mercado onde está:</div>
      <div class="grid sm:grid-cols-2 gap-2">
      ${locais.map(l=>`<button data-loc="${l.id}" class="px-3 py-2.5 rounded-xl border border-bci-line bg-white text-left hover:border-bci-pink text-[13.5px]"><b>${l.nome}</b><br><span class="text-bci-muted">${l.provincia}</span></button>`).join('')}
      </div>`;
    box.querySelectorAll('[data-loc]').forEach(b=>{
      b.onclick = ()=>{
        const l = locais.find(x=>x.id===b.dataset.loc);
        setResult(l.lat+0.00005, l.lng+0.00005, l);
      };
    });
  };
}

function bindChefe(){
  $('#chefeLogout').onclick = logout;
  $('#btnBackToBanqueiro').onclick = ()=>{ Session.clear(); appMode='banqueiro'; render(); };

  // map
  setTimeout(()=>{
    const mapEl = document.getElementById('chefeMap');
    if(!mapEl) return;
    const map = L.map('chefeMap', { scrollWheelZoom:false }).setView([-8.8383, 13.2344], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution:'© OpenStreetMap' }).addTo(map);
    const pres = DB.read('Presenca').filter(p=>p.data===todayISO());
    pres.forEach(p=>{
      const color = p.status==='no_local' ? '#16a34a' : '#ef4444';
      const m = L.circleMarker([p.lat, p.lng], { radius:9, color:'#fff', weight:3, fillColor: color, fillOpacity:1 }).addTo(map);
      m.bindPopup(`<b>${p.nome}</b><br>${p.local_nome}<br>${p.status==='no_local' ? 'No local ✓' : 'Fora do local'}<br>Entrada: ${p.entrada} ${p.saida ? ' • Saída: '+p.saida : ''}`);
    });
  }, 60);

  // stats
  const contasHoje = DB.read('Contas').filter(c=>c.data===todayISO());
  const byProv = {};
  contasHoje.forEach(c=>{
    const loc = DB.read('Locais').find(l=> (c.local||'').includes(l.nome));
    const prov = loc ? loc.provincia : 'Luanda';
    byProv[prov] = (byProv[prov]||0)+1;
  });
  const maxProv = Math.max(1, ...Object.values(byProv));
  document.getElementById('provBars').innerHTML = Object.entries(byProv).map(([p,v])=>`
    <div>
      <div class="flex justify-between"><span>${p}</span><span class="font-[700]">${v}</span></div>
      <div class="h-2.5 bg-bci-bg rounded-full overflow-hidden"><div style="width:${(v/maxProv*100).toFixed(0)}%" class="h-full bg-bci-pink rounded-full"></div></div>
    </div>
  `).join('') || '<span class="text-bci-muted">Sem contas hoje.</span>';

  const byBanq = {};
  contasHoje.forEach(c=>{ const k = c.banqueiro_nome + ' § ' + c.banqueiro_id; byBanq[k] = (byBanq[k]||0)+1; });
  const rank = Object.entries(byBanq).sort((a,b)=>b[1]-a[1]);
  document.getElementById('rankList').innerHTML = rank.map(([k,v],i)=> {
    const [nome,id] = k.split(' § ');
    return `<div class="flex items-center justify-between bg-bci-bg rounded-xl px-3 py-2"><div><span class="text-bci-muted mr-2">#${i+1}</span><b>${nome}</b> <span class="text-bci-muted">${id}</span></div><div class="font-[800]">${v}</div></div>`;
  }).join('') || '<span class="text-bci-muted">Sem movimento hoje.</span>';

  function renderPresTable(){
    const fp = $('#fProv').value;
    const fl = $('#fLocal').value;
    let rows = DB.read('Presenca').filter(p=>p.data===todayISO());
    if(fp) rows = rows.filter(r=>r.provincia===fp);
    if(fl) rows = rows.filter(r=>r.local_nome===fl);
    $('#presTbody').innerHTML = rows.map(p=>`
      <tr class="border-t border-bci-line">
        <td class="px-5 py-3 font-semibold">${p.nome}</td>
        <td class="px-5 py-3 font-mono text-[12.5px]">${p.banqueiro_id}</td>
        <td class="px-5 py-3">
          <span class="px-2.5 py-1 rounded-full text-[11.5px] font-[700] ${p.status==='no_local' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}">
            ${p.status==='no_local' ? 'No local' : 'Fora do local'}
          </span>
        </td>
        <td class="px-5 py-3">${p.entrada}</td>
        <td class="px-5 py-3">${p.saida || '—'}</td>
        <td class="px-5 py-3 text-bci-muted text-[12.5px]">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</td>
        <td class="px-5 py-3">${p.local_nome}</td>
      </tr>
    `).join('') || `<tr><td colspan="7" class="px-5 py-6 text-bci-muted">Sem registos para este filtro.</td></tr>`;
  }
  renderPresTable();
  $('#fProv').onchange = renderPresTable;
  $('#fLocal').onchange = renderPresTable;
  $('#btnRefreshPres').onclick = ()=>{ renderPresTable(); toast('Dados actualizados'); };
}

/* Init */
render();
