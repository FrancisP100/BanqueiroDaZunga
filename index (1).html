function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }

const DB = {
  configKey: 'bci_zumba_sheet_config',
  rulesKey: 'bci_zumba_rules',
  getConfig(){
    try { return JSON.parse(localStorage.getItem(this.configKey) || '{}'); } catch { return {}; }
  },
  saveConfig(cfg){ localStorage.setItem(this.configKey, JSON.stringify(cfg)); },
  getRules(){
    try { return { horaLimite: '08:00', toleranciaMin: 15, ...JSON.parse(localStorage.getItem(this.rulesKey) || '{}') }; }
    catch { return { horaLimite: '08:00', toleranciaMin: 15 }; }
  },
  saveRules(r){ localStorage.setItem(this.rulesKey, JSON.stringify(r)); },
  init(){
    SHEET_TABLES.forEach(t => {
      const key = 'bci_zumba_'+t.toLowerCase();
      if(!localStorage.getItem(key)){
        localStorage.setItem(key, JSON.stringify(DEFAULT_DB[t] || []));
      }
    });
  },
  read(table){
    return JSON.parse(localStorage.getItem('bci_zumba_'+table.toLowerCase()) || '[]');
  },
  write(table, rows){
    localStorage.setItem('bci_zumba_'+table.toLowerCase(), JSON.stringify(rows));
  },
  insert(table, row){
    const rows = this.read(table);
    rows.unshift(row);
    this.write(table, rows);
    return row;
  },
  update(table, matchFn, patch){
    const rows = this.read(table);
    const idx = rows.findIndex(matchFn);
    if(idx > -1){ rows[idx] = {...rows[idx], ...patch}; this.write(table, rows); return rows[idx]; }
    return null;
  },
  remove(table, matchFn){
    const rows = this.read(table);
    const next = rows.filter(r=>!matchFn(r));
    this.write(table, next);
    return rows.length - next.length;
  }
};
DB.init();

  clear(){ localStorage.removeItem('bci_zumba_session'); }
};

/* Utils */
const $ = sel => document.querySelector(sel);
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(-4px)';
  clearTimeout(toast._tid);
  toast._tid = setTimeout(()=> { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(6px)'; }, 2400);
}
function fmtDate(iso){ if(!iso) return '-'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function nowHM(){ return new Date().toLocaleTimeString('pt-PT',{hour:'2-digit', minute:'2-digit'}); }
function haversine(lat1, lon1, lat2, lon2){
  const R=6371e3; const toRad = x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function genId(prefix){ return prefix + '-' + Math.floor(8000 + Math.random()*1999); }
function hmToMinutes(hm){ if(!hm) return null; const [h,m] = hm.split(':').map(Number); return h*60+m; }

/* Pontualidade: compara hora de entrada com a regra (hora limite + tolerância) */
function calcPontualidade(entradaHM){
  const rules = DB.getRules();
  const limite = hmToMinutes(rules.horaLimite) + (Number(rules.toleranciaMin)||0);
  const entrada = hmToMinutes(entradaHM);
  if(entrada === null) return 'falta';
  return entrada <= limite ? 'no_horario' : 'atraso';
}

/* Gera registos de falta automática: banqueiros activos sem presença hoje após a hora limite */
function gerarFaltasAutomaticas(){
  const rules = DB.getRules();
  const agora = hmToMinutes(nowHM());
  const limite = hmToMinutes(rules.horaLimite) + (Number(rules.toleranciaMin)||0);
  if(agora < limite) return; // ainda dentro da janela, não marcar falta
  const hoje = todayISO();
  const banqueiros = DB.read('Usuarios_Banqueiros').filter(b=>b.ativo!==false);
  const presencas = DB.read('Presenca');
  let alterou = false;
  banqueiros.forEach(b=>{
    const existe = presencas.find(p=>p.banqueiro_id===b.id_banqueiro && p.data===hoje);
    if(!existe){
      const loc = DB.read('Locais').find(l=>l.id===b.local_id);
      presencas.unshift({
        id: genId('PR'),
        banqueiro_id: b.id_banqueiro,
        nome: b.nome,
        data: hoje,
        entrada: '',
        saida: '',
        lat: loc?loc.lat:null, lng: loc?loc.lng:null,
        local_nome: loc ? loc.nome : (b.provincia||'-'),
        provincia: b.provincia || (loc?loc.provincia:'-'),
        status: 'falta',
        pontualidade: 'falta',
        origem: 'automatico'
      });
      alterou = true;
    }
  });
  if(alterou) DB.write('Presenca', presencas);
}

function logout(){ Session.clear(); session=null; route='dashboard'; render(); }

/* RENDER ROOT */
function render(){
  session = Session.get();
  gerarFaltasAutomaticas();
  const app = document.getElementById('app');
  if(!session){
    app.innerHTML = AuthScreen(appMode);
    bindAuth();
    return;
  }
  if(session.mode !== appMode){
    appMode = session.mode;
  }

  if(appMode === 'banqueiro'){
    app.innerHTML = BanqueiroShell();
    bindBanqueiro();
  } else if(appMode === 'chefe') {
    app.innerHTML = ChefeShell();
    bindChefe();
  } else {
    app.innerHTML = AdminShell();
    bindAdmin();
  }
}

function bindAuth(){
  document.querySelectorAll('[data-go-mode]').forEach(btn=>{
    btn.onclick = ()=>{ appMode = btn.dataset.goMode; render(); };
  });
  let authMode = 'login';
  document.querySelectorAll('.auth-tab').forEach(btn=>{
    btn.onclick = () => {
      authMode = btn.dataset.authTab;
      document.querySelectorAll('.auth-tab').forEach(b=>{
        b.classList.remove('bg-bci-navy','text-white');
        b.classList.add('text-bci-muted');
      });
      btn.classList.add('bg-bci-navy','text-white');
      btn.classList.remove('text-bci-muted');
      $('#auth_extra').classList.toggle('hidden', authMode==='login');
      $('#auth_submit_btn').textContent = authMode==='login' ? 'Entrar na plataforma' : 'Criar conta';
    }
  });

  $('#authForm').onsubmit = (e)=>{
    e.preventDefault();
    const nome = $('#auth_nome').value.trim();
    const id = $('#auth_id').value.trim();
    const tel = ($('#auth_tel')?.value || '').trim();
    if(!nome || !id){ toast('Preencha nome e ID'); return; }
    const cfg = MODE_LABELS[appMode];
    const table = cfg.table;
    const idField = cfg.idField;
    const users = DB.read(table);
    const found = users.find(u => (u.nome||'').toLowerCase() === nome.toLowerCase() && u[idField] === id);

    if(authMode === 'register'){
      if(found){ toast('Esse utilizador já existe. Faça login.'); return; }
      if(appMode === 'admin'){ toast('Contas de Administração só podem ser criadas por outro Administrador.'); return; }
      const newUser = appMode==='banqueiro'
        ? { nome, id_banqueiro:id, telefone: tel, provincia:"Luanda", ativo:true }
        : { nome, id_chefe:id, area:"Luanda" };
      DB.insert(table, newUser);
      Session.set(appMode, newUser);
      toast('Conta criada com sucesso!');
      render();
      return;
    } else {
      if(!found){ toast('Credenciais inválidas. Verifique Nome + ID.'); return; }
      Session.set(appMode, found);
      toast('Sessão iniciada');
      render();
    }
  };
}

function initials(name){
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

function pontualidadeBadge(p){
  const map = {

    falta: ['bg-red-50 text-red-600','Falta'],

  const [cls,label] = map[p] || ['bg-bci-bg text-bci-muted','—'];
  return `<span class="px-2.5 py-1 rounded-full text-[11.5px] font-[700] ${cls}">${label}</span>`;
}

function bindBanqueiro(){
  document.querySelectorAll('#bqNav [data-route]').forEach(b=>{
    b.onclick = ()=> navigate(b.dataset.route);
  });
  document.querySelectorAll('[data-route-go]').forEach(b=>{
    b.onclick = ()=> navigate(b.dataset.routeGo);
  });
  $('#btnLogout').onclick = logout;
  $('#btnSwitchToChefe').onclick = ()=> { Session.clear(); appMode='chefe'; render(); };
  $('#btnSheetCfg').onclick = ()=> {
    $('#sheetModal').classList.remove('hidden');
    const cfg = DB.getConfig();
    $('#sheetEndpoint').value = cfg.endpoint || '';
  };
  document.querySelectorAll('[data-close-sheet]').forEach(el=> el.onclick = ()=> $('#sheetModal').classList.add('hidden'));
  $('#saveSheetCfg')?.addEventListener('click', ()=>{
    DB.saveConfig({ endpoint: $('#sheetEndpoint').value.trim() });
    toast('Configuração guardada localmente');
    $('#sheetModal').classList.add('hidden');
  });

  // Presence buttons
  const presenceBtns = ['#quickPresenceBtn','#dashPresence'].map(s=>document.querySelector(s)).filter(Boolean);
  presenceBtns.forEach(btn=> btn.onclick = openPresenceFlow);

  // Conta form
  const contaForm = $('#contaForm');
  if(contaForm){
    contaForm.onsubmit = (e)=>{
      e.preventDefault();
      const fd = new FormData(contaForm);
      const user = Session.get().user;
      const row = {
        id: genId('CT'),
        data: todayISO(),
        banqueiro_id: user.id_banqueiro,
        banqueiro_nome: user.nome,
        cliente_nome: fd.get('cliente_nome'),
        bi: fd.get('bi'),
        telefone: fd.get('telefone'),
        pacote: fd.get('pacote'),
        status: 'aberta',
        local: (fd.get('local')||'').split(' – ')[0]
      };
      DB.insert('Contas', row);
      toast('Conta aberta e sincronizada com a Sheet Contas');
      navigate('contas_abertas');
    };
  }

  const exportBtn = $('#exportCsv');
  if(exportBtn){
    exportBtn.onclick = ()=>{
      const rows = DB.read('Contas').filter(c=>c.banqueiro_id === Session.get().user.id_banqueiro);
      const csv = 'ID,Data,Cliente,BI,Telefone,Pacote,Status\n' + rows.map(r=>[r.id,r.data,r.cliente_nome,r.bi,r.telefone,r.pacote,r.status].join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'contas_banqueiro.csv'; a.click();
    };
  }

  // mobile sidebar toggle
  const side = $('#sideMenu');
  let menuOpen = false;
  $('#btnOpenMenu').onclick = ()=>{
    menuOpen = !menuOpen;
    side.classList.toggle('hidden', false);
    if(window.innerWidth < 1024){
      side.style.display = menuOpen ? 'block' : 'none';
    }
  };
  if(window.innerWidth < 1024){
    side.style.display = 'none';
  }
  window.addEventListener('resize', ()=>{
    if(window.innerWidth >= 1024){ side.style.display = ''; }
  });

  // update presence quick status
  refreshPresenceQuick();
}

function refreshPresenceQuick(){
  const el = document.getElementById('presenceQuickStatus');
  if(!el) return;
  const user = Session.get()?.user;
  if(!user) return;
  const pres = DB.read('Presenca').find(p=>p.banqueiro_id===user.id_banqueiro && p.data===todayISO());
  if(!pres || !pres.entrada){ el.textContent = 'Ainda não marcada hoje'; return; }
  el.innerHTML = pres.status==='no_local'
    ? `<span class="text-emerald-700 font-semibold">Presente em ${pres.local_nome}</span> • entrada ${pres.entrada}${pres.saida ? ' • saída '+pres.saida : ''}`
    : `<span class="text-red-600 font-semibold">Fora do local</span> • ${pres.local_nome}`;
}

function openPresenceFlow(){
  const user = Session.get().user;
  const existing = DB.read('Presenca').find(p=>p.banqueiro_id === user.id_banqueiro && p.data===todayISO());
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 z-[70] flex items-center justify-center p-4';
  modal.innerHTML = `
    <div class="absolute inset-0 bg-bci-navy/55" data-close></div>
    <div class="relative bg-white rounded-[24px] shadow-soft w-full max-w-[560px] p-6">
      <div class="text-[20px] font-[800]">Marcar Presença • GPS</div>
      <p class="text-[13.5px] text-bci-muted mt-1">Vamos validar a sua localização contra os mercados cadastrados na aba <b>Locais</b>. Raio de validação: 100 m. Hora limite: <b>${DB.getRules().horaLimite}</b>.</p>
      <div id="presenceBox" class="mt-4 rounded-[16px] border border-bci-line bg-bci-bg px-4 py-4 text-[14px]">A obter localização…</div>
      <div class="flex flex-wrap gap-2 mt-4">
        <button id="btnDoPresence" class="px-4 py-3 rounded-xl bg-bci-navy text-white font-[700] scale-tap">Usar minha localização GPS</button>
        <button id="btnManualPresence" class="px-4 py-3 rounded-xl border border-bci-line font-semibold scale-tap">Escolher mercado manualmente</button>
        <button data-close class="px-4 py-3 rounded-xl text-bci-muted font-semibold">Fechar</button>
      </div>
      <div id="presenceResult" class="mt-3 text-[13.5px]"></div>
    </div>
  `;
  document.body.appendChild(modal);
  const close = ()=> modal.remove();
  modal.querySelectorAll('[data-close]').forEach(b=>b.onclick=close);

  const box = modal.querySelector('#presenceBox');
  const result = modal.querySelector('#presenceResult');

  function setResult(lat, lng, manualLocal=null){
    const locais = DB.read('Locais');
    let nearest = null, minDist = Infinity;
    locais.forEach(l=>{
      const d = haversine(lat, lng, l.lat, l.lng);
      if(d < minDist){ minDist = d; nearest = l; }
    });
    const within = minDist <= 100;
    const chosen = manualLocal || nearest;
    const status = manualLocal ? 'no_local' : (within ? 'no_local' : 'fora_do_local');
    const statusHtml = status==='no_local'
      ? `<span class="text-emerald-700 font-[700]">Presente no local correto ✓</span>`
      : `<span class="text-red-600 font-[700]">Fora do local • ${Math.round(minDist)}m do ${nearest.nome}</span>`;
    box.innerHTML = `Lat ${lat.toFixed(5)}, Lng ${lng.toFixed(5)}<br><b>${chosen.nome}</b> • ${chosen.provincia}<br>${statusHtml}`;

    const entradaHora = existing?.entrada || nowHM();
    const pontualidade = calcPontualidade(entradaHora);

    // Save
    const presList = DB.read('Presenca');
    const today = todayISO();
    const idx = presList.findIndex(p=>p.banqueiro_id===user.id_banqueiro && p.data===today);
    const record = {
      id: existing?.id || genId('PR'),
      banqueiro_id: user.id_banqueiro,
      nome: user.nome,
      data: today,
      entrada: entradaHora,
      saida: existing?.saida || '',
      lat, lng,
      local_nome: chosen.nome,
      provincia: chosen.provincia,
      status,
      pontualidade,
      origem: 'gps'
    };
    if(idx>=0) { presList[idx] = {...presList[idx], ...record}; DB.write('Presenca', presList); }
    else DB.insert('Presenca', record);

    const pontBadge = pontualidade==='atraso' ? '<span class="text-amber-600 font-semibold">Registo com atraso.</span>' : '<span class="text-emerald-700 font-semibold">Registo dentro do horário.</span>';
    result.innerHTML = status==='no_local'
      ? `<div class="text-emerald-700">Presença registada com sucesso na aba <b>Presenca</b>.</div><div class="mt-1">${pontBadge}</div>
         <button id="btnMarcarSaida" class="mt-2 px-3 py-2 rounded-lg bg-white border border-bci-line font-semibold text-[13px]">Marcar saída</button>`
      : `<div class="text-red-600 font-semibold">Alerta enviado aos Chefes e Administração: banqueiro fora do local.</div><div class="mt-1">${pontBadge}</div>`;

    refreshPresenceQuick();
    const saidaBtn = modal.querySelector('#btnMarcarSaida');
    if(saidaBtn){
      saidaBtn.onclick = ()=>{
        const list = DB.read('Presenca');
        const i = list.findIndex(p=>p.banqueiro_id===user.id_banqueiro && p.data===today);
        if(i>=0){ list[i].saida = nowHM(); DB.write('Presenca', list); toast('Saída registada'); result.innerHTML = '<span class="text-bci-muted">Saída registada às '+list[i].saida+'</span>'; refreshPresenceQuick(); }
      };
    }
  }

  modal.querySelector('#btnDoPresence').onclick = ()=>{
    if(!navigator.geolocation){ box.textContent = 'Geolocalização não suportada.'; return; }
    box.textContent = 'A obter GPS… permita o acesso.';
    navigator.geolocation.getCurrentPosition(pos=>{
      setResult(pos.coords.latitude, pos.coords.longitude);
    }, err=>{
      box.innerHTML = 'Não foi possível obter GPS ('+err.message+'). Use a selecção manual.';
    }, { enableHighAccuracy:true, timeout:9000 });
  };

  modal.querySelector('#btnManualPresence').onclick = ()=>{
    const locais = DB.read('Locais');
    box.innerHTML = `<div class="text-[12.5px] font-semibold text-bci-muted mb-2">Escolha o mercado onde está:</div>
      <div class="grid sm:grid-cols-2 gap-2">
      ${locais.map(l=>`<button data-loc="${l.id}" class="px-3 py-2.5 rounded-xl border border-bci-line bg-white text-left hover:border-bci-pink text-[13.5px]"><b>${l.nome}</b><br><span class="text-bci-muted">${l.provincia}</span></button>`).join('')}
      </div>`;
    box.querySelectorAll('[data-loc]').forEach(b=>{
      b.onclick = ()=>{
        const l = locais.find(x=>x.id===b.dataset.loc);
        setResult(l.lat+0.00005, l.lng+0.00005, l);
      };
    });
  };
}

function CorrigirPresencaModal(banqueiroId){
  const b = DB.read('Usuarios_Banqueiros').find(x=>x.id_banqueiro===banqueiroId);
  const hoje = todayISO();
  const existing = DB.read('Presenca').find(p=>p.banqueiro_id===banqueiroId && p.data===hoje);
  const locais = DB.read('Locais');
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 z-[70] flex items-center justify-center p-4';
  modal.innerHTML = `
    <div class="absolute inset-0 bg-bci-navy/55" data-close></div>
    <div class="relative bg-white rounded-[24px] shadow-soft w-full max-w-[520px] p-6">
      <div class="text-[18px] font-[800]">Corrigir presença • ${b ? b.nome : banqueiroId}</div>
      <p class="text-[13px] text-bci-muted mt-1">Ajuste manual da situação de hoje. Esta acção fica registada como correcção do Chefe.</p>
      <form id="correctForm" class="space-y-4 mt-4">
        <div>
          <label class="text-[12px] font-semibold text-bci-muted">Situação</label>
          <select name="pontualidade" class="w-full mt-1.5 rounded-xl border border-bci-line px-4 py-3 bg-white">
            <option value="no_horario" ${existing?.pontualidade==='no_horario'?'selected':''}>No horário</option>
            <option value="atraso" ${existing?.pontualidade==='atraso'?'selected':''}>Atraso</option>
            <option value="falta" ${(!existing || existing?.pontualidade==='falta')?'selected':''}>Falta</option>
          </select>
        </div>
        <div>
          <label class="text-[12px] font-semibold text-bci-muted">Hora de entrada (se aplicável)</label>
          <input type="time" name="entrada" value="${existing?.entrada||''}" class="w-full mt-1.5 rounded-xl border border-bci-line px-4 py-3" />
        </div>
        <div>
          <label class="text-[12px] font-semibold text-bci-muted">Local</label>
          <select name="local" class="w-full mt-1.5 rounded-xl border border-bci-line px-4 py-3 bg-white">
            ${locais.map(l=>`<option value="${l.id}" ${existing?.local_nome===l.nome?'selected':''}>${l.nome} – ${l.provincia}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="text-[12px] font-semibold text-bci-muted">Observação (opcional)</label>
          <input name="obs" value="${existing?.obs||''}" class="w-full mt-1.5 rounded-xl border border-bci-line px-4 py-3" placeholder="Ex: justificação apresentada" />
        </div>
        <div class="flex gap-2 justify-end pt-1">
          <button type="button" data-close class="px-4 py-2.5 rounded-xl border border-bci-line font-semibold text-[13.5px]">Cancelar</button>
          <button class="px-4 py-2.5 rounded-xl bg-bci-navy text-white font-semibold text-[13.5px]">Guardar correcção</button>
        </div>
      </form>
    </div>
  `;
  document.body.appendChild(modal);
  const close = ()=> modal.remove();
  modal.querySelectorAll('[data-close]').forEach(el=>el.onclick=close);

  modal.querySelector('#correctForm').onsubmit = (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const pontualidade = fd.get('pontualidade');
    const entrada = fd.get('entrada') || '';
    const localId = fd.get('local');
    const loc = locais.find(l=>l.id===localId);
    const list = DB.read('Presenca');
    const idx = list.findIndex(p=>p.banqueiro_id===banqueiroId && p.data===hoje);
    const record = {
      id: existing?.id || genId('PR'),
      banqueiro_id: banqueiroId,
      nome: b ? b.nome : banqueiroId,
      data: hoje,
      entrada: pontualidade==='falta' ? '' : entrada,
      saida: existing?.saida || '',
      lat: loc?loc.lat:existing?.lat, lng: loc?loc.lng:existing?.lng,
      local_nome: loc ? loc.nome : existing?.local_nome,
      provincia: loc ? loc.provincia : existing?.provincia,
      status: pontualidade==='falta' ? 'falta' : 'no_local',
      pontualidade,
      origem: 'correcao_chefe',
      obs: fd.get('obs')||''
    };
    if(idx>=0){ list[idx] = {...list[idx], ...record}; DB.write('Presenca', list); }
    else DB.insert('Presenca', record);
    toast('Presença corrigida com sucesso');
    close();
    render();
  };
}

function bindChefeVisaoGeral(){
  // map
  setTimeout(()=>{
    const mapEl = document.getElementById('chefeMap');
    if(!mapEl) return;
    const map = L.map('chefeMap', { scrollWheelZoom:false }).setView([-8.8383, 13.2344], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution:'© OpenStreetMap' }).addTo(map);
    const pres = DB.read('Presenca').filter(p=>p.data===todayISO() && p.lat && p.lng);
    pres.forEach(p=>{
      const color = p.status==='no_local' ? '#16a34a' : '#ef4444';
      const m = L.circleMarker([p.lat, p.lng], { radius:9, color:'#fff', weight:3, fillColor: color, fillOpacity:1 }).addTo(map);
      m.bindPopup(`<b>${p.nome}</b><br>${p.local_nome}<br>${p.status==='no_local' ? 'No local ✓' : 'Fora do local'}<br>Entrada: ${p.entrada||'—'} ${p.saida ? ' • Saída: '+p.saida : ''}`);
    });
  }, 60);

  // stats
  const hoje = todayISO();
  const contasHoje = DB.read('Contas').filter(c=>c.data===hoje);
  const byProv = {};
  contasHoje.forEach(c=>{
    const loc = DB.read('Locais').find(l=> (c.local||'').includes(l.nome));
    const prov = loc ? loc.provincia : 'Luanda';
    byProv[prov] = (byProv[prov]||0)+1;
  });
  const maxProv = Math.max(1, ...Object.values(byProv));
  document.getElementById('provBars').innerHTML = Object.entries(byProv).map(([p,v])=>`
    <div>
      <div class="flex justify-between"><span>${p}</span><span class="font-[700]">${v}</span></div>
      <div class="h-2.5 bg-bci-bg rounded-full overflow-hidden"><div style="width:${(v/maxProv*100).toFixed(0)}%" class="h-full bg-bci-pink rounded-full"></div></div>
    </div>
  `).join('') || '<span class="text-bci-muted">Sem contas hoje.</span>';

  const byBanq = {};
  contasHoje.forEach(c=>{ const k = c.banqueiro_nome + ' § ' + c.banqueiro_id; byBanq[k] = (byBanq[k]||0)+1; });
  const rank = Object.entries(byBanq).sort((a,b)=>b[1]-a[1]);
  document.getElementById('rankList').innerHTML = rank.map(([k,v],i)=> {
    const [nome,id] = k.split(' § ');
    return `<div class="flex items-center justify-between bg-bci-bg rounded-xl px-3 py-2"><div><span class="text-bci-muted mr-2">#${i+1}</span><b>${nome}</b> <span class="text-bci-muted">${id}</span></div><div class="font-[800]">${v}</div></div>`;
  }).join('') || '<span class="text-bci-muted">Sem movimento hoje.</span>';

  function renderPresTable(){
    const fp = $('#fProv').value;
    const fl = $('#fLocal').value;
    let rows = DB.read('Presenca').filter(p=>p.data===todayISO());
    if(fp) rows = rows.filter(r=>r.provincia===fp);
    if(fl) rows = rows.filter(r=>r.local_nome===fl);
    $('#presTbody').innerHTML = rows.map(p=>`
      <tr class="border-t border-bci-line">
        <td class="px-5 py-3 font-semibold">${p.nome}</td>
        <td class="px-5 py-3 font-mono text-[12.5px]">${p.banqueiro_id}</td>
        <td class="px-5 py-3">
          <span class="px-2.5 py-1 rounded-full text-[11.5px] font-[700] ${p.status==='no_local' ? 'bg-emerald-50 text-emerald-700' : p.status==='falta' ? 'bg-red-50 text-red-600' : 'bg-red-50 text-red-600'}">
            ${p.status==='no_local' ? 'No local' : p.status==='falta' ? 'Falta' : 'Fora do local'}
          </span>
        </td>
        <td class="px-5 py-3">${p.entrada || '—'}</td>
        <td class="px-5 py-3">${p.saida || '—'}</td>
        <td class="px-5 py-3 text-bci-muted text-[12.5px]">${p.lat ? p.lat.toFixed(4)+', '+p.lng.toFixed(4) : '—'}</td>
        <td class="px-5 py-3">${p.local_nome}</td>
      </tr>
    `).join('') || `<tr><td colspan="7" class="px-5 py-6 text-bci-muted">Sem registos para este filtro.</td></tr>`;
  }
  renderPresTable();
  $('#fProv').onchange = renderPresTable;
  $('#fLocal').onchange = renderPresTable;
  $('#btnRefreshPres').onclick = ()=>{ renderPresTable(); toast('Dados actualizados'); };
}

function bindChefeHoras(){
  document.querySelectorAll('[data-correct-banqueiro]').forEach(btn=>{
    btn.onclick = ()=> CorrigirPresencaModal(btn.dataset.correctBanqueiro);
  });
  $('#btnMarcarFaltaManual').onclick = ()=>{
    const banqueiros = DB.read('Usuarios_Banqueiros');
    if(!banqueiros.length){ toast('Sem banqueiros cadastrados'); return; }
    CorrigirPresencaModal(banqueiros[0].id_banqueiro);
  };
  $('#rulesForm').onsubmit = (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    DB.saveRules({ horaLimite: fd.get('horaLimite'), toleranciaMin: Number(fd.get('toleranciaMin')) });
    toast('Regra de pontualidade actualizada');
    render();
  };
}

    <div class="bg-white rounded-[22px] border border-bci-line shadow-card">

              <th class="text-left px-5 py-3">Nome</th>
              <th class="text-left px-5 py-3">Nº balcão</th>

              ${isAdmin ? '<th class="text-right px-5 py-3">Acção</th>' : ''}

}

function renderMercadosTable(contexto){
  const isAdmin = contexto === 'admin';
  const filtro = document.getElementById('mercadoFiltroProv')?.value || '';
  let locais = DB.read('Locais');
  if(filtro) locais = locais.filter(l=>l.provincia===filtro);
  const tbody = document.getElementById('mercadosTbody');
  if(!tbody) return;
  tbody.innerHTML = locais.map(l=>`
    <tr class="border-t border-bci-line">
      <td class="px-5 py-3 font-semibold">${l.nome}</td>
      <td class="px-5 py-3 font-mono text-[12.5px]">${l.balcao || '—'}</td>
      <td class="px-5 py-3 capitalize">${l.tipo || 'mercado'}</td>
      <td class="px-5 py-3 text-bci-muted">${l.provincia}</td>
      <td class="px-5 py-3">${l.qtd_banqueiros ?? 0}</td>
      <td class="px-5 py-3 text-bci-muted text-[12.5px]">${l.lat?.toFixed(4)}, ${l.lng?.toFixed(4)}</td>
      ${isAdmin ? `<td class="px-5 py-3 text-right"><button data-del-mercado="${l.id}" class="text-red-600 font-semibold text-[12.5px]">Remover</button></td>` : ''}
    </tr>
  `).join('') || `<tr><td colspan="${isAdmin?7:6}" class="px-5 py-6 text-bci-muted">Nenhum mercado cadastrado para este filtro.</td></tr>`;

  if(isAdmin){
    tbody.querySelectorAll('[data-del-mercado]').forEach(btn=>{
      btn.onclick = ()=>{
        if(!confirm('Remover este mercado/balcão da lista?')) return;
        DB.remove('Locais', l=>l.id===btn.dataset.delMercado);
        toast('Mercado removido');
        renderMercadosTable(contexto);
      };
    });
  }
}

function bindPainelMercados(contexto){
  renderMercadosTable(contexto);
  document.getElementById('mercadoFiltroProv')?.addEventListener('change', ()=> renderMercadosTable(contexto));

  if(contexto !== 'admin') return;

  const wrap = document.getElementById('mercadoFormWrap');
  $('#btnNovoMercado').onclick = ()=>{
    wrap.classList.toggle('hidden');
    wrap.scrollIntoView({behavior:'smooth', block:'nearest'});
  };
  $('#btnCancelarMercado').onclick = ()=>{ wrap.classList.add('hidden'); };

  $('#btnUsarMinhaLoc').onclick = ()=>{
    if(!navigator.geolocation){ toast('Geolocalização não suportada'); return; }
    navigator.geolocation.getCurrentPosition(pos=>{
      document.querySelector('input[name="lat"]').value = pos.coords.latitude.toFixed(6);
      document.querySelector('input[name="lng"]').value = pos.coords.longitude.toFixed(6);
      toast('Coordenadas preenchidas');
    }, ()=> toast('Não foi possível obter GPS'));
  };

  $('#mercadoForm').onsubmit = (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const row = {
      id: 'L' + String(Date.now()).slice(-6),
      nome: fd.get('nome'),
      balcao: fd.get('balcao'),
      tipo: fd.get('tipo'),
      provincia: fd.get('provincia'),
      qtd_banqueiros: Number(fd.get('qtd_banqueiros'))||0,
      lat: Number(fd.get('lat')),
      lng: Number(fd.get('lng')),
    };
    DB.insert('Locais', row);
    toast('Mercado cadastrado e sincronizado com a Sheet Locais');
    e.target.reset();
    document.getElementById('mercadoFormWrap').classList.add('hidden');
    renderMercadosTable('admin');
  };
}

function AdminVisaoGeral(){

  const presHoje = DB.read('Presenca').filter(p=>p.data===hoje);
  const faltas = presHoje.filter(p=>p.pontualidade==='falta').length;
  const atrasos = presHoje.filter(p=>p.pontualidade==='atraso').length;

  return `
    <div class="relative hero-admin texture-dots rounded-[26px] overflow-hidden min-h-[200px] flex items-end shadow-card mb-5">

    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-5 gap-4">
      ${[
        ['Banqueiros activos', banqueiros.filter(b=>b.ativo!==false).length],
        ['Mercados/Balcões', locais.length],
        ['Contas hoje', contasHoje.length],
        ['Atrasos hoje', atrasos],
        ['Faltas hoje', faltas],
      ].map(([t,v])=>`
        <div class="bg-white rounded-[20px] border border-bci-line shadow-card px-5 py-5 card-rise">
          <div class="text-[12.5px] text-bci-muted font-semibold">${t}</div>
          <div class="text-[30px] font-[800] tracking-tight text-bci-navy stat-num">${v}</div>
        </div>
      `).join('')}
    </div>

    <div class="grid lg:grid-cols-2 gap-5 mt-5">
      <div class="bg-white rounded-[22px] border border-bci-line shadow-card p-5">
        <div class="font-[800] mb-3">Mercados por província</div>
        <div class="space-y-2 text-[13px]">
          ${(() => {
            const byProv = {};
            locais.forEach(l=>{ byProv[l.provincia] = (byProv[l.provincia]||0)+1; });

                <div class="h-2.5 bg-bci-bg rounded-full overflow-hidden"><div style="width:${(v/max*100).toFixed(0)}%" class="h-full bg-bci-gold rounded-full"></div></div>

      </div>
      <div class="bg-white rounded-[22px] border border-bci-line shadow-card p-5">
        <div class="font-[800] mb-3">Banqueiros com falta ou atraso hoje</div>
        <div class="space-y-2 text-[13.5px]">
          ${presHoje.filter(p=>p.pontualidade!=='no_horario').map(p=>`
            <div class="flex items-center justify-between bg-bci-bg rounded-xl px-3 py-2">
